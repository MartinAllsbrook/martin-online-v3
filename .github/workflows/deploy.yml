name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  pull_request: # Optional: enables preview deployments for PRs

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x # Ensures you use the latest Deno 2 features

      - name: Install dependencies
        run: deno install

      - name: Build Fresh Project
        run: deno task build

      - name: Deploy Fresh server to Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy _fresh/server.js